# MOSAIC CS2 — Atlantic hurricane (Ida-like), August–September 2021
# ----------------------------------------------------------------------------
# Combines CMEMS Global L4 SST + ECMWF ERA5 atmospheric fields (10 m wind,
# MSLP, total precipitation) over the Gulf of Mexico landfall window of
# Hurricane Ida. Produces a harmonized Zarr store with a `hurricane_zone`
# derived mask. The IBTrACS storm track is distributed alongside the
# pipeline as a CSV (see `tests/fixtures/cs2/ibtracs_ida_like.csv`) and
# is overlaid in the companion notebook for visualisation; it does not
# enter the harmonized dataset.
apiVersion: mosaic/v1
kind: Pipeline

metadata:
  name: cs2_atlantic_hurricane_2021
  description: >-
    Hurricane Ida landfall window over the Gulf of Mexico. Demonstrates
    semantic harmonization across CMEMS Global L4 SST and ERA5 atmospheric
    products and a derived hurricane-zone mask combining wind speed and
    mean sea-level pressure.
  authors:
    - { name: "Gabriela Gic-Grusza", orcid: "0000-0002-5542-1182" }
    - { name: "Adrian Bugaj", orcid: "0009-0008-8287-1796"}
    - { name: "Sebastian Dudzik", orcid: "0000-0002-9559-7115"}
    - { name: "Piotr Szeląg", orcid: "0000-0002-9528-3263"}
  tags: [case_study, atlantic, hurricane, cs2]

spec:
  domain:
    bbox: [-95.0, 18.0, -78.0, 32.0]
    time:
      start: "2021-08-26"
      stop:  "2021-09-02"
      resolution: "1D"

  sources:
    - id: cmems_sst
      plugin: cmems
      params:
        # Global OSTIA L4 SST, 0.05 deg daily reprocessed (Met Office).
        # Verified live on 2026-05-12 via
        # `copernicusmarine.describe(contains=["GLO","SST","L4"])`; the
        # legacy CMEMS-1.x id `cmems_obs-sst_glo_phy_l4_my_P1D-m` no
        # longer resolves after the Marine Data Store migration.
        dataset_id: METOFFICE-GLO-SST-L4-REP-OBS-SST
        variables: [analysed_sst]
        cache_dir: data/cache/cmems

    - id: era5_atmos
      plugin: era5
      params:
        dataset: reanalysis-era5-single-levels
        product_type: reanalysis
        variables:
          - 10m_u_component_of_wind
          - 10m_v_component_of_wind
          - mean_sea_level_pressure
          - total_precipitation
        hours: ["00:00", "06:00", "12:00", "18:00"]
        cache_dir: data/cache/era5

  harmonize:
    cf_dictionary: configs/cf_atlantic.yaml
    time_alignment: daily_mean
    overrides:
      cmems_sst.analysed_sst:
        standard_name: sea_surface_temperature
        units: K
      era5_atmos.msl:
        standard_name: air_pressure_at_mean_sea_level
        units: hPa

  qc:
    rules:
      sea_surface_temperature:
        type: range
        min: 270.0
        max: 310.0
        flag: out_of_range
      eastward_wind:
        type: range
        min: -80.0
        max: 80.0
        flag: out_of_range
      northward_wind:
        type: range
        min: -80.0
        max: 80.0
        flag: out_of_range
      air_pressure_at_mean_sea_level:
        type: range
        min: 870.0
        max: 1060.0
        flag: out_of_range

  fuse:
    derived:
      - name: wind_speed
        expression: "sqrt(eastward_wind**2 + northward_wind**2)"
      - name: storm_intensity
        expression: "1013.0 - air_pressure_at_mean_sea_level"
      - name: hurricane_zone
        expression: "(wind_speed > 17.0) & (air_pressure_at_mean_sea_level < 980.0)"

  export:
    format: zarr
    path: out/cs2_atlantic_hurricane_2021.zarr
    provenance: true

  reproducibility:
    seed: 0
    strict_versions: false
